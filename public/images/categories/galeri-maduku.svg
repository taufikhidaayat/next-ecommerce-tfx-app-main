<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- Circle background -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.4"/>
  <circle cx="100" cy="100" r="70" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.2"/>
  <!-- GM monogram -->
  <text x="100" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="url(#gold)">GM</text>
  <!-- Decorative line -->
  <line x1="60" y1="108" x2="140" y2="108" stroke="#fbbf24" stroke-width="1.5" opacity="0.5"/>
  <!-- Brand name -->
  <text x="100" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fbbf24" opacity="0.8" letter-spacing="2">GALERI MADUKU</text>
</svg>