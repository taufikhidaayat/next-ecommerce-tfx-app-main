<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 480" width="1600" height="480" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="50%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="orangeAccent2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <pattern id="grid2" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#60a5fa" stroke-width="0.5" stroke-opacity="0.1"/>
    </pattern>
    <pattern id="diag2" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse" patternTransform="rotate(-25)">
      <line x1="0" y1="0" x2="0" y2="60" stroke="#fb923c" stroke-width="2" stroke-opacity="0.06"/>
    </pattern>
  </defs>

  <rect width="1600" height="480" fill="url(#bg2)"/>
  <rect width="1600" height="480" fill="url(#diag2)"/>
  <rect width="1600" height="480" fill="url(#grid2)"/>

  <!-- Background glow blobs -->
  <circle cx="1450" cy="80" r="200" fill="#fb923c" fill-opacity="0.08"/>
  <circle cx="100" cy="420" r="180" fill="#60a5fa" fill-opacity="0.12"/>

  <!-- Left accent bar (orange now) -->
  <rect x="0" y="0" width="8" height="480" fill="url(#orangeAccent2)"/>

  <!-- ==== LEFT: BRAND BLOCK ==== -->
  <g transform="translate(80, 130)">
    <circle cx="0" cy="-30" r="6" fill="#fb923c"/>
    <text x="20" y="-23" font-family="'Inter', 'Segoe UI', sans-serif"
          font-size="16" font-weight="700" fill="#fb923c" letter-spacing="3">LAYANAN ANTAR</text>

    <text x="0" y="50" font-family="'Inter', 'Segoe UI', sans-serif"
          font-size="58" font-weight="900" fill="#ffffff" letter-spacing="-1">TOKO</text>
    <text x="0" y="105" font-family="'Inter', 'Segoe UI', sans-serif"
          font-size="34" font-weight="700" fill="#ffffff" letter-spacing="2">LANGGANANKU</text>

    <line x1="0" y1="135" x2="120" y2="135" stroke="#fb923c" stroke-width="3"/>

    <text x="0" y="175" font-family="'Inter', 'Segoe UI', sans-serif"
          font-size="13" font-weight="600" fill="#93c5fd" letter-spacing="3">DELIVERY RADIUS 5 KM</text>
  </g>

  <line x1="440" y1="60" x2="440" y2="420" stroke="#fb923c" stroke-width="2" stroke-opacity="0.5"/>

  <!-- ==== CENTER: BIG ITALIC TEXT + speed lines ==== -->
  <!-- Speed lines behind text -->
  <g stroke="#fb923c" stroke-width="5" stroke-linecap="round" opacity="0.5">
    <line x1="460" y1="120" x2="540" y2="120"/>
    <line x1="450" y1="160" x2="510" y2="160"/>
    <line x1="465" y1="350" x2="520" y2="350"/>
  </g>

  <g transform="translate(490, 80)" font-family="'Inter', 'Segoe UI', sans-serif" font-style="italic" font-weight="900" letter-spacing="-3">
    <text x="0" y="130" font-size="140" fill="#ffffff">GRATIS</text>
    <text x="0" y="290" font-size="140" fill="#fb923c">ONGKIR</text>
  </g>

  <line x1="1210" y1="60" x2="1210" y2="420" stroke="#fb923c" stroke-width="2" stroke-opacity="0.5"/>

  <!-- ==== RIGHT: DETAILS ==== -->
  <g transform="translate(1250, 130)">
    <text x="0" y="0" font-family="'Inter', 'Segoe UI', sans-serif"
          font-size="20" font-weight="800" fill="#fb923c" letter-spacing="3">MINIMUM BELANJA</text>

    <text x="0" y="60" font-family="'Inter', 'Segoe UI', sans-serif"
          font-size="44" font-weight="900" fill="#ffffff" letter-spacing="-1">Rp 500.000</text>

    <line x1="0" y1="90" x2="80" y2="90" stroke="#fb923c" stroke-width="2"/>

    <text x="0" y="130" font-family="'Inter', 'Segoe UI', sans-serif"
          font-size="15" font-weight="500" fill="#ffffff">Pengiriman langsung</text>
    <text x="0" y="154" font-family="'Inter', 'Segoe UI', sans-serif"
          font-size="15" font-weight="500" fill="#ffffff">ke alamat tujuan dalam</text>
    <text x="0" y="178" font-family="'Inter', 'Segoe UI', sans-serif"
          font-size="15" font-weight="500" fill="#ffffff">radius 5 km dari toko.</text>

    <text x="0" y="225" font-family="'Inter', 'Segoe UI', sans-serif"
          font-size="14" font-weight="700" fill="#93c5fd" letter-spacing="3">PILIH DELIVERY DI CHECKOUT</text>
  </g>

  <!-- Decorative chevrons (motion indicator) on right edge -->
  <g stroke="#fb923c" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.6">
    <path d="M 1530 200 L 1560 230 L 1530 260"/>
    <path d="M 1500 200 L 1530 230 L 1500 260"/>
  </g>
</svg>
