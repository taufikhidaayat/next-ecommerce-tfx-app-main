<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 480" width="1600" height="480" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4c1d95"/>
      <stop offset="50%" stop-color="#5b21b6"/>
      <stop offset="100%" stop-color="#2e1065"/>
    </linearGradient>
    <linearGradient id="goldShine3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fde047"/>
      <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>
    <radialGradient id="goldGlow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fde047" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#fde047" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid3" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#fde047" stroke-width="0.5" stroke-opacity="0.1"/>
    </pattern>
  </defs>

  <rect width="1600" height="480" fill="url(#bg3)"/>
  <rect width="1600" height="480" fill="url(#grid3)"/>

  <!-- Decorative gold glows -->
  <circle cx="200" cy="80" r="150" fill="url(#goldGlow3)"/>
  <circle cx="1400" cy="400" r="180" fill="url(#goldGlow3)"/>

  <!-- Sparkles scattered -->
  <g fill="#fde047">
    <path d="M 380 80 l 4 -12 l 4 12 l 12 4 l -12 4 l -4 12 l -4 -12 l -12 -4 z" opacity="0.8"/>
    <path d="M 1100 70 l 3 -9 l 3 9 l 9 3 l -9 3 l -3 9 l -3 -9 l -9 -3 z" opacity="0.7"/>
    <path d="M 1500 100 l 4 -12 l 4 12 l 12 4 l -12 4 l -4 12 l -4 -12 l -12 -4 z" opacity="0.7"/>
    <path d="M 1130 410 l 3 -9 l 3 9 l 9 3 l -9 3 l -3 9 l -3 -9 l -9 -3 z" opacity="0.8"/>
    <path d="M 340 410 l 3 -9 l 3 9 l 9 3 l -9 3 l -3 9 l -3 -9 l -9 -3 z" opacity="0.6"/>
  </g>

  <!-- Left accent bar (gold) -->
  <rect x="0" y="0" width="8" height="480" fill="url(#goldShine3)"/>

  <!-- ==== LEFT: BRAND BLOCK ==== -->
  <g transform="translate(80, 130)">
    <circle cx="0" cy="-30" r="6" fill="#fde047"/>
    <text x="20" y="-23" font-family="'Inter', 'Segoe UI', sans-serif"
          font-size="16" font-weight="700" fill="#fde047" letter-spacing="3">PROGRAM POIN</text>

    <text x="0" y="50" font-family="'Inter', 'Segoe UI', sans-serif"
          font-size="58" font-weight="900" fill="#ffffff" letter-spacing="-1">TOKO</text>
    <text x="0" y="105" font-family="'Inter', 'Segoe UI', sans-serif"
          font-size="34" font-weight="700" fill="#ffffff" letter-spacing="2">LANGGANANKU</text>

    <line x1="0" y1="135" x2="120" y2="135" stroke="#fde047" stroke-width="3"/>

    <text x="0" y="175" font-family="'Inter', 'Segoe UI', sans-serif"
          font-size="13" font-weight="600" fill="#c4b5fd" letter-spacing="3">REVIEW PRODUK • DAPAT POIN</text>
  </g>

  <line x1="440" y1="60" x2="440" y2="420" stroke="#fde047" stroke-width="2" stroke-opacity="0.5"/>

  <!-- ==== CENTER: BIG ITALIC TEXT + coin icon ==== -->
  <g transform="translate(490, 80)" font-family="'Inter', 'Segoe UI', sans-serif" font-style="italic" font-weight="900" letter-spacing="-3">
    <text x="0" y="130" font-size="140" fill="#ffffff">POIN</text>
    <text x="0" y="290" font-size="140" fill="url(#goldShine3)">LOYALTY</text>
  </g>

  <line x1="1210" y1="60" x2="1210" y2="420" stroke="#fde047" stroke-width="2" stroke-opacity="0.5"/>

  <!-- ==== RIGHT: 3-STEP FLOW ==== -->
  <g transform="translate(1250, 95)">
    <text x="0" y="0" font-family="'Inter', 'Segoe UI', sans-serif"
          font-size="18" font-weight="800" fill="#fde047" letter-spacing="3">CARA DAPAT POIN</text>

    <!-- Step 1: Checkout -->
    <g transform="translate(0, 35)">
      <circle cx="18" cy="18" r="18" fill="none" stroke="#fde047" stroke-width="2"/>
      <text x="18" y="25" text-anchor="middle"
            font-family="'Inter', sans-serif" font-size="18" font-weight="900" fill="#fde047">1</text>
      <text x="50" y="16" font-family="'Inter', sans-serif"
            font-size="22" font-weight="800" fill="#ffffff">Checkout</text>
      <text x="50" y="36" font-family="'Inter', sans-serif"
            font-size="13" font-weight="500" fill="#c4b5fd">Lakukan pesanan</text>
    </g>

    <!-- Connecting line -->
    <line x1="18" y1="80" x2="18" y2="100" stroke="#fde047" stroke-width="2" stroke-dasharray="3,3" opacity="0.6"/>

    <!-- Step 2: Review Produk -->
    <g transform="translate(0, 105)">
      <circle cx="18" cy="18" r="18" fill="none" stroke="#fde047" stroke-width="2"/>
      <text x="18" y="25" text-anchor="middle"
            font-family="'Inter', sans-serif" font-size="18" font-weight="900" fill="#fde047">2</text>
      <text x="50" y="16" font-family="'Inter', sans-serif"
            font-size="22" font-weight="800" fill="#ffffff">Review Produk</text>
      <text x="50" y="36" font-family="'Inter', sans-serif"
            font-size="13" font-weight="500" fill="#c4b5fd">Setelah barang sampai</text>
    </g>

    <!-- Connecting line -->
    <line x1="18" y1="150" x2="18" y2="170" stroke="#fde047" stroke-width="2" stroke-dasharray="3,3" opacity="0.6"/>

    <!-- Step 3: Dapat Poin -->
    <g transform="translate(0, 175)">
      <circle cx="18" cy="18" r="18" fill="#fde047"/>
      <text x="18" y="25" text-anchor="middle"
            font-family="'Inter', sans-serif" font-size="18" font-weight="900" fill="#4c1d95">3</text>
      <text x="50" y="16" font-family="'Inter', sans-serif"
            font-size="22" font-weight="800" fill="#fde047">Dapat Poin</text>
      <text x="50" y="36" font-family="'Inter', sans-serif"
            font-size="13" font-weight="500" fill="#c4b5fd">1% per produk, maks 50% redeem</text>
    </g>

    <text x="0" y="270" font-family="'Inter', sans-serif"
          font-size="13" font-weight="700" fill="#c4b5fd" letter-spacing="3">POIN TIDAK PERNAH HANGUS</text>
  </g>
</svg>
