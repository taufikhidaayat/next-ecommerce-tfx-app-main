<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 480" width="1600" height="480" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgPh" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#064e3b"/>
      <stop offset="50%" stop-color="#065f46"/>
      <stop offset="100%" stop-color="#052e1f"/>
    </linearGradient>
    <linearGradient id="goldPh" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fde047"/>
      <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>
    <pattern id="gridPh" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#fbbf24" stroke-width="0.5" stroke-opacity="0.08"/>
    </pattern>
    <radialGradient id="glowPh" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="480" fill="url(#bgPh)"/>
  <rect width="1600" height="480" fill="url(#gridPh)"/>

  <!-- Decorative glows -->
  <circle cx="200" cy="100" r="200" fill="url(#glowPh)"/>
  <circle cx="1400" cy="380" r="220" fill="url(#glowPh)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="8" height="480" fill="url(#goldPh)"/>

  <!-- ==== LEFT: BRAND BLOCK ==== -->
  <g transform="translate(80, 130)">
    <circle cx="0" cy="-30" r="6" fill="#fbbf24"/>
    <text x="20" y="-23" font-family="'Inter', 'Segoe UI', sans-serif"
          font-size="16" font-weight="700" fill="#fbbf24" letter-spacing="3">SELAMAT DATANG</text>

    <text x="0" y="50" font-family="'Inter', 'Segoe UI', sans-serif"
          font-size="58" font-weight="900" fill="#ffffff" letter-spacing="-1">TOKO</text>
    <text x="0" y="105" font-family="'Inter', 'Segoe UI', sans-serif"
          font-size="34" font-weight="700" fill="#ffffff" letter-spacing="2">LANGGANANKU</text>

    <line x1="0" y1="135" x2="120" y2="135" stroke="#fbbf24" stroke-width="3"/>

    <text x="0" y="175" font-family="'Inter', 'Segoe UI', sans-serif"
          font-size="14" font-weight="600" fill="#86efac" letter-spacing="3">KELONTONG TERLENGKAP &#x2022; TERMURAH</text>
  </g>

  <!-- Vertical divider -->
  <line x1="490" y1="60" x2="490" y2="420" stroke="#fbbf24" stroke-width="2" stroke-opacity="0.5"/>

  <!-- ==== CENTER: tagline ==== -->
  <g transform="translate(540, 80)" font-family="'Inter', 'Segoe UI', sans-serif" font-style="italic" font-weight="900" letter-spacing="-3">
    <text x="0" y="140" font-size="130" fill="#ffffff">BELANJA</text>
    <text x="0" y="300" font-size="130" fill="#fbbf24">LENGKAP</text>
  </g>

  <!-- Vertical divider -->
  <line x1="1180" y1="60" x2="1180" y2="420" stroke="#fbbf24" stroke-width="2" stroke-opacity="0.5"/>

  <!-- ==== RIGHT: details ==== -->
  <g transform="translate(1220, 110)">
    <circle cx="0" cy="-30" r="6" fill="#fbbf24"/>
    <text x="20" y="-23" font-family="'Inter', 'Segoe UI', sans-serif"
          font-size="14" font-weight="700" fill="#fbbf24" letter-spacing="3">PROMO</text>

    <text x="0" y="0" font-family="'Inter', 'Segoe UI', sans-serif"
          font-size="22" font-weight="800" fill="#fbbf24" letter-spacing="3">SEGERA HADIR</text>

    <text x="0" y="50" font-family="'Inter', 'Segoe UI', sans-serif"
          font-size="17" font-weight="500" fill="#ffffff">Pantau terus halaman</text>
    <text x="0" y="74" font-family="'Inter', 'Segoe UI', sans-serif"
          font-size="17" font-weight="500" fill="#ffffff">ini untuk promo dan</text>
    <text x="0" y="98" font-family="'Inter', 'Segoe UI', sans-serif"
          font-size="17" font-weight="500" fill="#ffffff">diskon menarik.</text>

    <line x1="0" y1="130" x2="80" y2="130" stroke="#fbbf24" stroke-width="2"/>

    <text x="0" y="180" font-family="'Inter', 'Segoe UI', sans-serif"
          font-size="38" font-weight="900" fill="#ffffff" letter-spacing="-1">Belanja</text>
    <text x="0" y="225" font-family="'Inter', 'Segoe UI', sans-serif"
          font-size="38" font-weight="900" fill="#ffffff" letter-spacing="-1">Sekarang</text>
  </g>
</svg>
