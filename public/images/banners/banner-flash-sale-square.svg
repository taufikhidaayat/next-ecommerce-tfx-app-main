<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="1000" height="1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgFs" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9a3412"/>
      <stop offset="50%" stop-color="#7c2d12"/>
      <stop offset="100%" stop-color="#451a03"/>
    </linearGradient>
    <linearGradient id="goldFs" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fde047"/>
      <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>
    <radialGradient id="warmGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <pattern id="gridFs" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#fde047" stroke-width="0.5" stroke-opacity="0.1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1000" height="1000" fill="url(#bgFs)"/>
  <rect width="1000" height="1000" fill="url(#gridFs)"/>

  <!-- Decorative glows -->
  <circle cx="200" cy="200" r="250" fill="url(#warmGlow)"/>
  <circle cx="800" cy="800" r="280" fill="url(#warmGlow)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1000" height="8" fill="url(#goldFs)"/>
  <!-- Bottom accent bar -->
  <rect x="0" y="992" width="1000" height="8" fill="url(#goldFs)"/>

  <!-- ==== TOP: brand block (cropped on mobile, OK) ==== -->
  <g transform="translate(60, 80)">
    <circle cx="0" cy="0" r="7" fill="#fde047"/>
    <text x="22" y="6" font-family="'Inter', 'Segoe UI', sans-serif"
          font-size="20" font-weight="700" fill="#fde047" letter-spacing="3">TOKO LANGGANANKU</text>
  </g>

  <!-- Decorative lightning bolts in top corners -->
  <g transform="translate(870, 100) rotate(15)">
    <path d="M 0 0 L 40 0 L 20 50 L 55 50 L 5 145 L 30 80 L -5 80 Z"
          fill="#fde047" stroke="#a16207" stroke-width="2" stroke-linejoin="round"/>
  </g>

  <!-- ==== MIDDLE: critical content (safe on mobile crop) ==== -->
  <!-- Center band roughly y=300 to y=700 -->

  <!-- Promo badge -->
  <g transform="translate(500, 320)">
    <rect x="-160" y="-26" width="320" height="52" rx="26" fill="#fde047"/>
    <text x="0" y="8" text-anchor="middle"
          font-family="'Inter', 'Segoe UI', sans-serif"
          font-size="22" font-weight="800" fill="#7c2d12" letter-spacing="4">PROMO TERBATAS</text>
  </g>

  <!-- BIG HEADLINE -->
  <g text-anchor="middle"
     font-family="'Inter', 'Segoe UI', sans-serif"
     font-style="italic" font-weight="900"
     letter-spacing="-4">
    <text x="500" y="470" font-size="180" fill="#ffffff">FLASH</text>
    <text x="500" y="630" font-size="180" fill="url(#goldFs)">SALE</text>
  </g>

  <!-- ==== BOTTOM: subtitle + CTA ==== -->
  <text x="500" y="740" text-anchor="middle"
        font-family="'Inter', 'Segoe UI', sans-serif"
        font-size="28" font-weight="700" fill="#ffffff" letter-spacing="2">STOK TERBATAS &#x2022; HARGA SPESIAL</text>

  <!-- CTA button -->
  <g transform="translate(500, 820)">
    <rect x="-180" y="-30" width="360" height="70" rx="35" fill="url(#goldFs)"/>
    <text x="0" y="10" text-anchor="middle"
          font-family="'Inter', 'Segoe UI', sans-serif"
          font-size="28" font-weight="900" fill="#7c2d12" letter-spacing="1">BELANJA SEKARANG</text>
  </g>

  <!-- Sparkles scattered for festive feel -->
  <g fill="#fde047">
    <path d="M 120 480 l 6 -18 l 6 18 l 18 6 l -18 6 l -6 18 l -6 -18 l -18 -6 z" opacity="0.7"/>
    <path d="M 880 480 l 6 -18 l 6 18 l 18 6 l -18 6 l -6 18 l -6 -18 l -18 -6 z" opacity="0.7"/>
    <path d="M 200 720 l 4 -12 l 4 12 l 12 4 l -12 4 l -4 12 l -4 -12 l -12 -4 z" opacity="0.6"/>
    <path d="M 820 720 l 4 -12 l 4 12 l 12 4 l -12 4 l -4 12 l -4 -12 l -12 -4 z" opacity="0.6"/>
  </g>
</svg>
